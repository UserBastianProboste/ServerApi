<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MC Panel</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link
    href="https://fonts.googleapis.com/css2?family=Space+Mono:ital,wght@0,400;0,700;1,400&family=Unbounded:wght@400;700;900&display=swap"
    rel="stylesheet" />
  <style>
    :root {
      --bg: #080a0d;
      --surface: #0f1217;
      --surface2: #161b24;
      --border: #1a2030;
      --border2: #242e40;
      --green: #3dff8f;
      --green-bg: rgba(61, 255, 143, 0.08);
      --orange: #ffaa38;
      --red: #ff4d6a;
      --blue: #40b3ff;
      --text: #ccd6e8;
      --text-dim: #4a5568;
      --text-mid: #7a8899;
      --disp: 'Unbounded', sans-serif;
      --mono: 'Space Mono', monospace;
    }

    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--mono);
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* Scanline grid */
    body::after {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(61, 255, 143, 0.015) 1px, transparent 1px),
        linear-gradient(90deg, rgba(61, 255, 143, 0.015) 1px, transparent 1px);
      background-size: 36px 36px;
      pointer-events: none;
      z-index: 0;
    }

    /* ══════════════════════════════
     LOGIN SCREEN
  ══════════════════════════════ */
    #login-screen {
      position: fixed;
      inset: 0;
      z-index: 100;
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--bg);
    }

    #login-screen.hidden {
      display: none;
    }

    .login-box {
      width: 360px;
      background: var(--surface);
      border: 1px solid var(--border2);
      border-radius: 16px;
      padding: 2.5rem;
      position: relative;
      animation: fade-up 0.4s ease;
    }

    .login-box::before {
      content: '';
      position: absolute;
      top: 0;
      left: 10%;
      right: 10%;
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--green), transparent);
      opacity: 0.5;
    }

    @keyframes fade-up {
      from {
        opacity: 0;
        transform: translateY(20px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .login-icon {
      width: 56px;
      height: 56px;
      background: var(--green-bg);
      border: 1px solid rgba(61, 255, 143, 0.25);
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.6rem;
      margin: 0 auto 1.5rem;
      box-shadow: 0 0 30px rgba(61, 255, 143, 0.15);
    }

    .login-title {
      font-family: var(--disp);
      font-size: 1.1rem;
      font-weight: 900;
      color: #fff;
      text-align: center;
      margin-bottom: 0.3rem;
      letter-spacing: -0.02em;
    }

    .login-sub {
      font-size: 0.68rem;
      color: var(--text-dim);
      text-align: center;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      margin-bottom: 2rem;
    }

    .field {
      margin-bottom: 1rem;
    }

    .field label {
      display: block;
      font-size: 0.62rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--text-mid);
      margin-bottom: 0.5rem;
    }

    .field input {
      width: 100%;
      background: var(--surface2);
      border: 1px solid var(--border2);
      border-radius: 8px;
      padding: 0.75rem 1rem;
      font-family: var(--mono);
      font-size: 0.85rem;
      color: var(--text);
      outline: none;
      transition: border-color 0.2s;
      letter-spacing: 0.05em;
    }

    .field input:focus {
      border-color: rgba(61, 255, 143, 0.4);
      box-shadow: 0 0 0 3px rgba(61, 255, 143, 0.06);
    }

    .login-error {
      font-size: 0.7rem;
      color: var(--red);
      text-align: center;
      margin-bottom: 0.8rem;
      min-height: 1em;
    }

    .btn-login {
      width: 100%;
      padding: 0.85rem;
      background: var(--green);
      color: #000;
      font-family: var(--mono);
      font-size: 0.8rem;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      transition: all 0.2s;
    }

    .btn-login:hover {
      background: #5cffaa;
      box-shadow: 0 0 20px rgba(61, 255, 143, 0.35);
    }

    .btn-login:active {
      transform: scale(0.98);
    }

    .btn-login:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    /* ══════════════════════════════
     MAIN APP
  ══════════════════════════════ */
    #app {
      position: relative;
      z-index: 10;
    }

    header {
      padding: 1.8rem 2.5rem 1.4rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-bottom: 1px solid var(--border);
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 0.9rem;
    }

    .logo-icon {
      width: 40px;
      height: 40px;
      background: var(--green-bg);
      border: 1px solid rgba(61, 255, 143, 0.2);
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.2rem;
      animation: glow-pulse 3s ease-in-out infinite;
    }

    @keyframes glow-pulse {

      0%,
      100% {
        box-shadow: 0 0 12px rgba(61, 255, 143, 0.2);
      }

      50% {
        box-shadow: 0 0 24px rgba(61, 255, 143, 0.45);
      }
    }

    .logo h1 {
      font-family: var(--disp);
      font-size: 1.1rem;
      font-weight: 900;
      color: #fff;
      letter-spacing: -0.03em;
      line-height: 1;
    }

    .logo span {
      font-size: 0.62rem;
      color: var(--text-dim);
      letter-spacing: 0.12em;
      text-transform: uppercase;
    }

    .header-right {
      display: flex;
      align-items: center;
      gap: 1.2rem;
    }

    .conn-status {
      display: flex;
      align-items: center;
      gap: 0.45rem;
      font-size: 0.68rem;
      color: var(--text-dim);
    }

    .dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--green);
      animation: blink 2s ease-in-out infinite;
    }

    .dot.offline {
      background: var(--text-dim);
      animation: none;
    }

    .dot.warn {
      background: var(--orange);
    }

    @keyframes blink {

      0%,
      100% {
        opacity: 1;
      }

      50% {
        opacity: 0.25;
      }
    }

    .btn-logout {
      background: transparent;
      border: 1px solid var(--border2);
      border-radius: 6px;
      padding: 0.4rem 0.8rem;
      font-family: var(--mono);
      font-size: 0.65rem;
      color: var(--text-dim);
      cursor: pointer;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      transition: all 0.2s;
    }

    .btn-logout:hover {
      color: var(--red);
      border-color: rgba(255, 77, 106, 0.35);
    }

    /* ── MAIN CONTENT ── */
    main {
      padding: 2rem 2.5rem;
    }

    .section-header {
      display: flex;
      align-items: center;
      margin-bottom: 1.4rem;
      gap: 1rem;
    }

    .section-label {
      font-size: 0.62rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--text-dim);
      white-space: nowrap;
    }

    .section-line {
      flex: 1;
      height: 1px;
      background: var(--border);
    }

    .summary-chips {
      display: flex;
      gap: 0.6rem;
    }

    .chip {
      font-size: 0.62rem;
      padding: 0.2rem 0.6rem;
      border-radius: 999px;
      border: 1px solid var(--border2);
      color: var(--text-dim);
      letter-spacing: 0.06em;
      white-space: nowrap;
    }

    .chip.green {
      border-color: rgba(61, 255, 143, 0.25);
      color: var(--green);
    }

    .chip.orange {
      border-color: rgba(255, 170, 56, 0.25);
      color: var(--orange);
    }

    /* ── GRID ── */
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(310px, 1fr));
      gap: 1rem;
    }

    /* ── CARD ── */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 1.4rem;
      position: relative;
      overflow: hidden;
      transition: border-color 0.3s, transform 0.2s, box-shadow 0.3s;
    }

    .card:hover {
      transform: translateY(-2px);
      border-color: var(--border2);
    }

    .card.online {
      border-color: rgba(61, 255, 143, 0.2);
      box-shadow: 0 0 0 1px rgba(61, 255, 143, 0.05) inset;
    }

    .card.online::after {
      content: '';
      position: absolute;
      inset: 0;
      background: radial-gradient(ellipse at 100% 0%, rgba(61, 255, 143, 0.05) 0%, transparent 55%);
      pointer-events: none;
    }

    .card.starting {
      border-color: rgba(255, 170, 56, 0.2);
    }

    .card.starting::after {
      content: '';
      position: absolute;
      inset: 0;
      background: radial-gradient(ellipse at 100% 0%, rgba(255, 170, 56, 0.05) 0%, transparent 55%);
      pointer-events: none;
    }

    /* Card header row */
    .card-head {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      margin-bottom: 1rem;
      gap: 0.5rem;
    }

    .card-identity {
      display: flex;
      align-items: center;
      gap: 0.8rem;
    }

    .srv-icon {
      font-size: 1.6rem;
      line-height: 1;
      filter: drop-shadow(0 2px 6px rgba(0, 0, 0, 0.5));
    }

    .srv-name {
      font-family: var(--disp);
      font-size: 0.85rem;
      font-weight: 700;
      color: #fff;
      line-height: 1.1;
    }

    .srv-meta {
      font-size: 0.63rem;
      color: var(--text-dim);
      margin-top: 0.2rem;
    }

    /* Status pill */
    .pill {
      display: inline-flex;
      align-items: center;
      gap: 0.35rem;
      font-size: 0.6rem;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      padding: 0.28rem 0.65rem;
      border-radius: 999px;
      white-space: nowrap;
      flex-shrink: 0;
    }

    .pill.online {
      background: rgba(61, 255, 143, 0.1);
      color: var(--green);
      border: 1px solid rgba(61, 255, 143, 0.25);
    }

    .pill.offline {
      background: rgba(74, 85, 104, 0.12);
      color: var(--text-dim);
      border: 1px solid var(--border);
    }

    .pill.starting {
      background: rgba(255, 170, 56, 0.1);
      color: var(--orange);
      border: 1px solid rgba(255, 170, 56, 0.3);
      animation: pill-blink 1.4s ease-in-out infinite;
    }

    @keyframes pill-blink {

      0%,
      100% {
        opacity: 1;
      }

      50% {
        opacity: 0.45;
      }
    }

    .pill-dot {
      width: 5px;
      height: 5px;
      border-radius: 50%;
      background: currentColor;
    }

    .pill.online .pill-dot {
      animation: blink 1.5s ease-in-out infinite;
    }

    /* Stats row */
    .card-stats {
      display: flex;
      gap: 1.4rem;
      margin-bottom: 1.1rem;
    }

    .stat-item {
      display: flex;
      flex-direction: column;
      gap: 0.15rem;
    }

    .stat-label {
      font-size: 0.57rem;
      text-transform: uppercase;
      letter-spacing: 0.14em;
      color: var(--text-dim);
    }

    .stat-val {
      font-size: 0.82rem;
      font-weight: 700;
      color: var(--text);
    }

    .stat-val.green {
      color: var(--green);
    }

    .stat-val.dim {
      color: var(--text-dim);
    }

    /* Divider */
    .card-divider {
      height: 1px;
      background: var(--border);
      margin-bottom: 1.1rem;
    }

    /* Actions */
    .card-actions {
      display: flex;
      gap: 0.5rem;
    }

    .btn {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.4rem;
      padding: 0.65rem 0.8rem;
      border-radius: 7px;
      border: none;
      font-family: var(--mono);
      font-size: 0.7rem;
      font-weight: 700;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      cursor: pointer;
      transition: all 0.18s;
    }

    .btn:disabled {
      opacity: 0.3;
      cursor: not-allowed;
      transform: none !important;
      box-shadow: none !important;
    }

    .btn-start {
      background: var(--green);
      color: #000;
    }

    .btn-start:hover:not(:disabled) {
      background: #60ffaa;
      box-shadow: 0 0 16px rgba(61, 255, 143, 0.4);
      transform: scale(1.02);
    }

    .btn-stop {
      background: transparent;
      color: var(--red);
      border: 1px solid rgba(255, 77, 106, 0.3);
    }

    .btn-stop:hover:not(:disabled) {
      background: rgba(255, 77, 106, 0.1);
      border-color: var(--red);
      transform: scale(1.02);
    }

    /* ── TOAST ── */
    #toast {
      position: fixed;
      bottom: 1.8rem;
      right: 1.8rem;
      z-index: 9999;
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
      pointer-events: none;
    }

    .toast-item {
      background: var(--surface2);
      border: 1px solid var(--border2);
      border-radius: 8px;
      padding: 0.75rem 1.1rem;
      font-size: 0.75rem;
      color: var(--text);
      display: flex;
      align-items: center;
      gap: 0.6rem;
      box-shadow: 0 4px 24px rgba(0, 0, 0, 0.5);
      animation: toast-in 0.3s ease;
      max-width: 300px;
    }

    .toast-item.success {
      border-color: rgba(61, 255, 143, 0.3);
      color: var(--green);
    }

    .toast-item.error {
      border-color: rgba(255, 77, 106, 0.3);
      color: var(--red);
    }

    @keyframes toast-in {
      from {
        transform: translateX(20px);
        opacity: 0;
      }

      to {
        transform: translateX(0);
        opacity: 1;
      }
    }

    /* ── FOOTER ── */
    footer {
      position: relative;
      z-index: 10;
      padding: 1.2rem 2.5rem;
      border-top: 1px solid var(--border);
      font-size: 0.62rem;
      color: var(--text-dim);
      display: flex;
      justify-content: space-between;
      margin-top: 1rem;
    }

    /* Skeleton */
    .skel-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 1.4rem;
      display: flex;
      flex-direction: column;
      gap: 0.9rem;
    }

    .skel {
      border-radius: 5px;
      background: linear-gradient(90deg, var(--surface) 25%, var(--surface2) 50%, var(--surface) 75%);
      background-size: 200% 100%;
      animation: shimmer 1.6s infinite;
    }

    @keyframes shimmer {
      0% {
        background-position: 200% 0;
      }

      100% {
        background-position: -200% 0;
      }
    }
  </style>
</head>

<body>

  <!-- ══ LOGIN SCREEN ══ -->
  <div id="login-screen">
    <div class="login-box">
      <div class="login-icon">⛏️</div>
      <div class="login-title">MC Panel</div>
      <div class="login-sub">Acceso restringido</div>

      <div class="field">
        <label>Contraseña</label>
        <input type="password" id="pwd-input" placeholder="••••••••••" autocomplete="current-password" />
      </div>

      <div class="login-error" id="login-error"></div>

      <button class="btn-login" id="login-btn" onclick="doLogin()">Entrar</button>
    </div>
  </div>

  <!-- ══ APP ══ -->
  <div id="app">
    <header>
      <div class="logo">
        <div class="logo-icon">⛏️</div>
        <div>
          <h1>MC Panel</h1>
          <span>Server Manager</span>
        </div>
      </div>
      <div class="header-right">
        <div class="conn-status">
          <div class="dot" id="conn-dot"></div>
          <span id="conn-label">Conectando...</span>
        </div>
        <button class="btn-logout" onclick="doLogout()">Salir</button>
      </div>
    </header>

    <main>
      <div class="section-header">
        <span class="section-label">Servidores</span>
        <div class="summary-chips" id="summary-chips"></div>
        <div class="section-line"></div>
        <span id="last-update" style="font-size:0.6rem;color:var(--text-dim);white-space:nowrap"></span>
      </div>

      <div class="grid" id="servers-grid">
        <!-- Skeletons iniciales -->
        ${Array(5).fill(`
        <div class="skel-card">
          <div class="skel" style="height:22px;width:55%"></div>
          <div class="skel" style="height:13px;width:38%"></div>
          <div class="skel" style="height:36px;margin-top:0.5rem"></div>
        </div>`).join("")}
      </div>
    </main>

    <footer>
      <span>MC Panel — local server manager</span>
      <span>Auto-refresh cada 8s</span>
    </footer>
  </div>

  <div id="toast"></div>

  <script>
    // ─── CONFIG ────────────────────────────────────────────
    const API = "https://server.bastianproboste.work";
    const POLL_INTERVAL = 8000;
    const TOKEN_KEY = "mc_panel_token";
    // ───────────────────────────────────────────────────────

    let token = localStorage.getItem(TOKEN_KEY) || null;
    let pollTimer = null;

    // ── AUTH ──────────────────────────────────────────────

    function showApp() {
      document.getElementById("login-screen").classList.add("hidden");
      fetchServers();
      pollTimer = setInterval(fetchServers, POLL_INTERVAL);
    }

    function showLogin(msg = "") {
      clearInterval(pollTimer);
      document.getElementById("login-screen").classList.remove("hidden");
      document.getElementById("login-error").textContent = msg;
      document.getElementById("pwd-input").value = "";
      document.getElementById("pwd-input").focus();
    }

    async function doLogin() {
      const pwd = document.getElementById("pwd-input").value.trim();
      if (!pwd) return;

      const btn = document.getElementById("login-btn");
      btn.disabled = true;
      btn.textContent = "Verificando...";

      try {
        const res = await fetch(`${API}/login`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ password: pwd }),
        });
        const data = await res.json();

        if (data.ok) {
          token = data.token;
          localStorage.setItem(TOKEN_KEY, token);
          showApp();
        } else {
          document.getElementById("login-error").textContent = "Contraseña incorrecta";
        }
      } catch {
        document.getElementById("login-error").textContent = "No se pudo conectar al backend. ¿Está corriendo server.js?";
      }

      btn.disabled = false;
      btn.textContent = "Entrar";
    }

    function doLogout() {
      token = null;
      localStorage.removeItem(TOKEN_KEY);
      showLogin();
    }

    // Enter en el campo de contraseña
    document.getElementById("pwd-input").addEventListener("keydown", (e) => {
      if (e.key === "Enter") doLogin();
    });

    // ── STATUS ────────────────────────────────────────────

    function setConnected(val) {
      document.getElementById("conn-dot").className = val ? "dot" : "dot offline";
      document.getElementById("conn-label").textContent = val ? "Conectado" : "Sin conexión";
    }

    function toast(msg, type = "info") {
      const el = document.createElement("div");
      el.className = `toast-item ${type}`;
      const icons = { success: "✓", error: "✕", info: "ℹ" };
      el.innerHTML = `<span>${icons[type] || "ℹ"}</span> ${msg}`;
      document.getElementById("toast").appendChild(el);
      setTimeout(() => el.remove(), 4000);
    }

    // ── RENDER ────────────────────────────────────────────

    function pillFor(status) {
      const map = {
        online: { label: "Online", cls: "online" },
        offline: { label: "Offline", cls: "offline" },
        starting: { label: "Iniciando", cls: "starting" },
      };
      return map[status] || map.offline;
    }

    function renderCard(srv) {
      const p = pillFor(srv.status);
      return `
  <div class="card ${p.cls}" id="card-${srv.id}">
    <div class="card-head">
      <div class="card-identity">
        <div>
          <div class="srv-name">${srv.name}</div>
          <div class="srv-meta">v${srv.version} · ${srv.description}</div>
        </div>
      </div>
      <div class="pill ${p.cls}">
        <div class="pill-dot"></div>
        ${p.label}
      </div>
    </div>

    <div class="card-stats">
      <div class="stat-item">
        <div class="stat-label">Puerto</div>
        <div class="stat-val">${srv.port}</div>
      </div>
      <div class="stat-item">
        <div class="stat-label">Proceso</div>
        <div class="stat-val ${srv.processRunning ? 'green' : 'dim'}">
          ${srv.processRunning ? "Activo" : "Inactivo"}
        </div>
      </div>
      <div class="stat-item">
        <div class="stat-label">Puerto TCP</div>
        <div class="stat-val ${srv.portOpen ? 'green' : 'dim'}">
          ${srv.portOpen ? "Abierto" : "Cerrado"}
        </div>
      </div>
    </div>

    <div class="card-divider"></div>

    <div class="card-actions">
      <button class="btn btn-start" onclick="startServer('${srv.id}')"
        ${srv.status !== 'offline' ? 'disabled' : ''}>
        ▶ Iniciar
      </button>
      <button class="btn btn-stop" onclick="stopServer('${srv.id}')"
        ${!srv.processRunning ? 'disabled' : ''}>
        ■ Detener
      </button>
    </div>
  </div>`;
    }

    function renderSummary(servers) {
      const online = servers.filter(s => s.status === "online").length;
      const starting = servers.filter(s => s.status === "starting").length;
      const chips = document.getElementById("summary-chips");
      chips.innerHTML = "";
      if (online) chips.innerHTML += `<span class="chip green">${online} online</span>`;
      if (starting) chips.innerHTML += `<span class="chip orange">${starting} iniciando</span>`;
      chips.innerHTML += `<span class="chip">${servers.length} total</span>`;
    }

    // ── FETCH ────────────────────────────────────────────

    async function fetchServers() {
      try {
        const res = await fetch(`${API}/servers`, {
          headers: { "x-panel-token": token },
          signal: AbortSignal.timeout(6000),
        });

        if (res.status === 401) { doLogout(); return; }

        const data = await res.json();
        setConnected(true);

        document.getElementById("servers-grid").innerHTML = data.map(renderCard).join("");
        renderSummary(data);

        const now = new Date().toLocaleTimeString("es-AR");
        document.getElementById("last-update").textContent = now;
      } catch {
        setConnected(false);
      }
    }

    async function startServer(id) {
      try {
        const res = await fetch(`${API}/servers/${id}/start`, {
          method: "POST",
          headers: { "x-panel-token": token },
        });
        const data = await res.json();
        data.ok ? toast(data.message, "success") : toast(data.error || "Error", "error");
        setTimeout(fetchServers, 1500);
      } catch { toast("Sin conexión al backend", "error"); }
    }

    async function stopServer(id) {
      try {
        const res = await fetch(`${API}/servers/${id}/stop`, {
          method: "POST",
          headers: { "x-panel-token": token },
        });
        const data = await res.json();
        data.ok ? toast(data.message, "success") : toast(data.error || "Error", "error");
        setTimeout(fetchServers, 1500);
      } catch { toast("Sin conexión al backend", "error"); }
    }

    // ── INIT ─────────────────────────────────────────────
    if (token) {
      showApp();
    } else {
      showLogin();
    }
  </script>
</body>

</html>
